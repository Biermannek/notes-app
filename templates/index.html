<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poznámky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 680px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
    header p { color: #666; margin-top: 0.4rem; font-size: 0.95rem; }
    .card { background: #fff; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; font-size: 1rem; margin-bottom: 0.6rem; color: #1a1a2e; }
    textarea { width: 100%; padding: 0.85rem 1rem; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; font-family: inherit; resize: vertical; min-height: 100px; transition: border-color 0.2s; color: #1a1a2e; }
    textarea:focus { outline: none; border-color: #6c63ff; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 0.8rem; padding: 0.75rem 1.5rem; background: #6c63ff; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn:hover { background: #5a52d5; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: #b0aae8; cursor: not-allowed; }
    .notes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .notes-header h2 { font-size: 1.1rem; font-weight: 600; color: #444; }
    .badge { background: #6c63ff; color: #fff; border-radius: 999px; padding: 0.2rem 0.65rem; font-size: 0.8rem; font-weight: 700; }
    .note-item { background: #fff; border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.75rem; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border-left: 4px solid #6c63ff; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .note-meta { font-size: 0.78rem; color: #999; margin-bottom: 0.4rem; }
    .note-text { font-size: 0.97rem; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .empty { text-align: center; color: #aaa; padding: 2rem 0; font-size: 0.95rem; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1a2e; color: #fff; padding: 0.75rem 1.2rem; border-radius: 10px; font-size: 0.9rem; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 Poznámky</h1>
      <p>Jednoduché zápisky vždy po ruce</p>
    </header>
    <div class="card">
      <label for="noteInput">Co si chceš poznamenat?</label>
      <textarea id="noteInput" placeholder="Napiš svou poznámku..."></textarea>
      <button class="btn" id="saveBtn" onclick="saveNote()">＋ Uložit poznámku</button>
    </div>
    <div class="notes-header">
      <h2>Uložené poznámky</h2>
      <span class="badge" id="countBadge">0</span>
    </div>
    <div id="notesList"></div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    async function loadNotes() {
      const res = await fetch('/api/notes');
      const notes = await res.json();
      document.getElementById('countBadge').textContent = notes.length;
      const list = document.getElementById('notesList');
      if (notes.length === 0) { list.innerHTML = '<p class="empty">Zatím žádné poznámky. Přidej první! 👆</p>'; return; }
      list.innerHTML = notes.map(n => `<div class="note-item"><div class="note-meta">🕐 ${formatDate(n.created_at)}</div><div class="note-text">${escapeHtml(n.text)}</div></div>`).join('');
    }
    async function saveNote() {
      const input = document.getElementById('noteInput');
      const btn = document.getElementById('saveBtn');
      const text = input.value.trim();
      if (!text) { showToast('Poznámka nesmí být prázdná!'); return; }
      btn.disabled = true;
      try {
        const res = await fetch('/api/notes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
        if (res.ok) { input.value = ''; await loadNotes(); showToast('✓ Poznámka uložena'); }
      } finally { btn.disabled = false; input.focus(); }
    }
    document.getElementById('noteInput').addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') saveNote(); });
    function formatDate(str) { const d = new Date(str.includes('T') ? str : str.replace(' ', 'T')); return d.toLocaleString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    loadNotes();
  </script>
</body>
</html>
